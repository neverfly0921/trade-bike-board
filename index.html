<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貿易車報價看板</title>
<style>
  :root{color-scheme:light;--bg:#f5f6f8;--card:#ffffff;--line:#e3e6eb;--txt:#1f2937;--sub:#6b7280;--accent:#1d4ed8;--price:#b91c1c;--chip:#f0f2f5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--txt);padding:24px 20px;}
  .wrap{max-width:1200px;margin:0 auto;}
  h1{font-size:20px;font-weight:700;letter-spacing:.5px;margin-bottom:2px;}
  .meta{color:var(--sub);font-size:13px;margin-bottom:20px;}
  .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
  .bar input,.bar select{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:6px;font-size:14px;}
  .bar input:focus,.bar select:focus{outline:2px solid var(--accent);outline-offset:-1px;}
  .bar input{flex:1;min-width:180px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--sub);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;user-select:none;}
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 18px;min-width:110px;}
  .stat .n{font-size:20px;font-weight:700;}
  .stat .l{font-size:12px;color:var(--sub);margin-top:2px;}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  th,td{padding:11px 12px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{background:#f9fafb;color:var(--sub);font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--line);}
  th:hover{color:var(--accent);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#f3f6fc;}
  .brand{font-weight:700;}
  .price{color:var(--price);font-weight:700;white-space:nowrap;}
  .na{color:var(--sub);}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:500;}
  .t-new{background:#ecfdf5;color:#047857;}
  .t-used{background:#eff6ff;color:#1d4ed8;}
  .t-show{background:#fffbeb;color:#b45309;}
  .t-deal{background:#f5f3ff;color:#6d28d9;}
  a.src{color:var(--accent);text-decoration:none;font-size:12.5px;}
  a.src:hover{text-decoration:underline;}
  .foot{color:var(--sub);font-size:12px;margin-top:16px;line-height:1.7;}
  .colors{color:var(--sub);font-size:12px;}
  @media (max-width:640px){body{padding:14px 10px;}th,td{padding:8px 8px;font-size:12.5px;}}
</style>
</head>

<div class="wrap">
  <h1>貿易車報價看板</h1>

      <option value="30">近 30 天</option>

    <select id="priceSel">
      <option value="">價格不限</option>
      <option value="has">只看有標價</option>

  </div>
  <table>
    <thead><tr>

      <th data-k="finance">分期／優惠</th><th data-k="source">來源</th><th data-k="date">貼文</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>

  </div>
</div>

ource": "二寶重機(中壢)", "post_date": "2026-07-06", "url": "https://www.facebook.com/permalink.php?story_fbid=pfbid0y1Nsw2C2ym9sFh7oY6C3YARnis4PK6EJ1ceydYnHcAjdU28hLZ5DjWRy2RbSLfRRl&id=100064048710170", "note": "現車在店，經典Super Cub外型", "captured": "2026-07-06"}, {"brand": "YAMAHA", "model": "R15 V3 / V4", "year": null, "type": "中古", "price": null, "price_kind": "私訊", "colors": "", "finance": "可全額貸", "promo": "暑期特賣，兩人同行優惠", "source": "爵士輕重型(蘆洲)", "post_date": "2026-06-30", "url": "https://www.facebook.com/reel/1045840644548230/", "note": "影片貼文未標價(補巡抓收錄)", "captured": "2026-07-06"}];
const REFDATE = new Date("2026-07-06");
let state={q:"",brand:"",type:"",price:"",time:"",sort:"",dir:1};
function typeKey(t){
  t=t||"";
  if(t.includes("中古")||t.includes("二手"))return"中古車";
  if(t.includes("新車")||t.includes("到店")||t.includes("刊登"))return"新車";
  if(t.includes("展示")||t.includes("改裝"))return"展示";
  return"交車";
}
function typeTag(t){
  const k=typeKey(t);
  const cls={"新車":"t-new","中古車":"t-used","展示":"t-deal","交車":"t-show"}[k];
  return '<span class="tag '+cls+'">'+t+'</span>';
}
function daysAgo(d){ if(!d) return 1e9; const dt=new Date(d); return Math.round((REFDATE-dt)/86400000); }
function fin(r){ return [r.finance, r.promo].filter(Boolean).join("·"); }
function render(){
  let rows=DATA.filter(r=>{
    if(state.brand && r.brand!==state.brand) return false;
    if(state.type && typeKey(r.type)!==state.type) return false;
    if(state.time && daysAgo(r.post_date) > (+state.time)) return false;
    if(state.price==="has" && r.price==null) return false;
    if(state.q){const s=(r.brand+r.model+r.colors+r.source+fin(r)).toLowerCase();if(!s.includes(state.q.toLowerCase()))return false;}
    return true;
  });
  if(state.sort){
    rows.sort((a,b)=>{
      let x=a[state.sort],y=b[state.sort];
      if(state.sort==="price"){x=x==null?-1:x;y=y==null?-1:y;return (x-y)*state.dir;}
      if(state.sort==="date"){return String(a.post_date).localeCompare(String(b.post_date))*state.dir;}
      return String(x).localeCompare(String(y),"zh-Hant")*state.dir;
    });
  }
  document.getElementById("tb").innerHTML=rows.map(r=>`<tr>
    <td class="brand">${r.brand}</td><td>${r.model}</td><td>${r.year}</td>
    <td>${typeTag(r.type)}</td>
    <td class="${r.price!=null?'price':'na'}">${r.price!=null?'$'+r.price.toLocaleString():'—'}</td>
    <td class="colors">${r.colors||'—'}</td>
    <td class="colors">${fin(r)||'—'}</td>
    <td>${r.source}</td>
    <td><a class="src" href="${r.url}" target="_blank">${r.post_date} ↗</a></td>
  </tr>`).join("");
  const priced=rows.filter(r=>r.price!=null);
  const avg=priced.length?Math.round(priced.reduce((s,r)=>s+r.price,0)/priced.length):0;
  const nNew=rows.filter(r=>typeKey(r.type)==="新車").length;
  const nUsed=rows.filter(r=>typeKey(r.type)==="中古車").length;
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="n">${rows.length}</div><div class="l">目前顯示車款</div></div>
    <div class="stat"><div class="n">${nNew}</div><div class="l">新車</div></div>
    <div class="stat"><div class="n">${nUsed}</div><div class="l">中古車</div></div>
    <div class="stat"><div class="n">$${avg.toLocaleString()}</div><div class="l">有標價平均</div></div>
    <div class="stat"><div class="n">12 / 12</div><div class="l">已巡來源</div></div>`;
}
const brands=[...new Set(DATA.map(r=>r.brand))];
document.getElementById("brandChips").innerHTML='<span class="chip on" data-b="">全部品牌</span>'+brands.map(b=>`<span class="chip" data-b="${b}">${b}</span>`).join("");
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); state.brand=c.dataset.b; render();
});
document.getElementById("q").oninput=e=>{state.q=e.target.value;render();};
document.getElementById("typeSel").onchange=e=>{state.type=e.target.value;render();};
document.getElementById("timeSel").onchange=e=>{state.time=e.target.value;render();};
document.getElementById("priceSel").onchange=e=>{state.price=e.target.value;render();};
document.querySelectorAll("th").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; state.dir=(state.sort===k)?-state.dir:1; state.sort=k; render();
});
render();
</script>
